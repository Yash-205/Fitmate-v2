<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw WebSocket Chat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        #chat-box { height: 300px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; margin-bottom: 10px; background: #f9f9f9; }
        .message { padding: 5px; border-bottom: 1px solid #eee; }
        input, button { padding: 10px; }
        input { width: 70%; }
        button { width: 25%; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Raw WebSocket Chat (No Socket.io)</h2>
    <p>Open this HTML file in two different browser tabs to see broadcasting in action!</p>
    
    <div id="chat-box"></div>
    
    <div>
        <input type="text" id="message-input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');

        // 1. Initiate the HTTP Handshake asking to upgrade to WebSockets
        const socket = new WebSocket('ws://localhost:8080');

        // 2. Listen for connection success
        socket.onopen = () => {
            addMessageToChat("System: Connected to server!");
        };

        // 3. Listen for incoming messages from the server
        socket.onmessage = (event) => {
            addMessageToChat(event.data);
        };

        // 4. Listen for disconnects
        socket.onclose = () => {
            addMessageToChat("System: Disconnected from server.");
        };

        // Function to send a message to the Node server
        function sendMessage() {
            const text = messageInput.value;
            if (text) {
                // We send raw strings over the WebSocket connection
                socket.send(text);
                messageInput.value = ''; // clear input
            }
        }

        // Helper function to render text to the screen
        function addMessageToChat(text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; // auto-scroll to bottom
        }

        // Allow pressing Enter to send
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
